name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Verify third-party notices
        run: |
          npm run notices
          git diff --exit-code -- THIRD_PARTY_NOTICES.md public/third-party-notices.txt

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: End-to-end tests
        run: npx playwright test

      - name: Verify release assets and deployment config
        run: npm run verify:release

      - name: Audit high-severity vulnerabilities
        run: npm audit --audit-level=high
